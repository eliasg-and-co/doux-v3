<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>doux — living music player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
<style>
  :root {
    --cream: #F5F0E8;
    --green: #2D5A3D;
    --green-mid: #3D7A52;
    --green-faint: rgba(45,90,61,0.07);
    --green-line: rgba(45,90,61,0.18);
    --mono: 'DM Mono', monospace;
    --serif: 'Shippori Mincho', serif;
    /* TOD — overridden at runtime */
    --tod-bg:  #F5F0E8;
    --tod-ink: #2D5A3D;
    --tod-faint: rgba(45,90,61,0.07);
    --tod-line:  rgba(45,90,61,0.18);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--tod-bg);
    color:var(--tod-ink);
    font-family:var(--mono);
    overflow-x:hidden;
    cursor:crosshair;
    transition:background 120s linear, color 120s linear;
  }
  #data-canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:0;}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:flex-start;padding:2rem 2.5rem;}
  .nav-icons{display:flex;gap:1.2rem;align-items:center;}
  .nav-icons svg{width:18px;height:18px;stroke:var(--green);fill:none;stroke-width:1.2;opacity:0.6;}
  .nav-title{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;opacity:0.5;line-height:1.6;text-align:center;}
  .hero{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 2.5rem 3rem;}
  .hero-name{font-family:var(--serif);font-size:clamp(5rem,16vw,15rem);font-weight:800;line-height:0.88;letter-spacing:-0.02em;}
  .hero-rule{width:100%;height:1px;background:var(--green);margin:1.8rem 0;opacity:0.25;}
  .hero-meta{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
  .meta-block label{font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;opacity:0.4;display:block;margin-bottom:0.3rem;}
  .meta-block p{font-size:0.8rem;line-height:1.6;opacity:0.75;}
  .live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:0.4rem;animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(0.7)}}
  section{position:relative;z-index:1;padding:6rem 2.5rem;border-top:1px solid var(--green-line);}
  .section-label{font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;opacity:0.35;margin-bottom:3rem;}
  .player-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;}
  .player-controls{display:flex;align-items:center;gap:1.5rem;}
  .master-play{display:flex;align-items:center;gap:0.7rem;background:var(--tod-ink);color:var(--tod-bg);border:none;padding:0.75rem 1.5rem;font-family:var(--mono);font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;cursor:crosshair;transition:opacity 0.2s;}
  .master-play:hover{opacity:0.82;}
  .master-play svg{width:11px;height:11px;fill:var(--tod-bg);stroke:none;}
  .player-status{font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;opacity:0.4;font-style:italic;}
  .player-hint{font-size:0.6rem;opacity:0.3;font-style:italic;}
  .player-consequence{font-family:var(--serif);font-size:clamp(1rem,2vw,1.5rem);font-weight:700;line-height:1.3;letter-spacing:-0.01em;opacity:0.82;margin-bottom:1.8rem;max-width:600px;}
  .player-consequence em{font-style:italic;font-weight:400;opacity:0.6;}
  #spectrum-canvas{width:100%;height:72px;display:block;margin-bottom:2.5rem;}
  .stems-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--green-line);border:1px solid var(--green-line);}
  @media(max-width:1100px){.stems-grid{grid-template-columns:repeat(3,1fr);}}
  @media(max-width:600px){.stems-grid{grid-template-columns:repeat(2,1fr);}}
  .stem-tile{background:var(--tod-bg);padding:1.8rem 1.5rem 1.5rem;cursor:crosshair;transition:background 0.22s;position:relative;user-select:none;display:flex;flex-direction:column;}
  .stem-tile:hover{background:var(--green-faint);}
  .stem-tile.active{background:var(--tod-ink);}
  .stem-state-badge{position:absolute;top:1rem;right:1rem;font-size:0.48rem;letter-spacing:0.18em;text-transform:uppercase;opacity:0;transition:opacity 0.2s;padding:0.2rem 0.5rem;border:1px solid currentColor;}
  .stem-tile:hover .stem-state-badge{opacity:0.5;}
  .stem-tile.active .stem-state-badge{opacity:0.8;color:var(--tod-bg);border-color:rgba(245,240,232,0.4);}
  .stem-source{font-size:0.52rem;letter-spacing:0.2em;text-transform:uppercase;opacity:0.4;margin-bottom:0.5rem;transition:color 0.22s,opacity 0.22s;}
  .stem-tile.active .stem-source{color:var(--tod-bg);opacity:0.5;}
  .stem-param{font-family:var(--serif);font-size:1.25rem;font-weight:700;margin-bottom:0.25rem;transition:color 0.22s;}
  .stem-tile.active .stem-param{color:var(--tod-bg);}
  .stem-target{font-size:0.62rem;opacity:0.45;font-style:italic;margin-bottom:1rem;transition:color 0.22s,opacity 0.22s;}
  .stem-tile.active .stem-target{color:var(--tod-bg);opacity:0.6;}
  .stem-canvas{display:block;width:100%;height:26px;margin-bottom:1rem;}
  .stem-mute{width:100%;padding:0.4rem 0;font-family:var(--mono);font-size:0.48rem;letter-spacing:0.18em;text-transform:uppercase;background:transparent;border:1px solid var(--green-line);color:var(--tod-ink);cursor:crosshair;transition:all 0.18s;display:block;margin-top:auto;}
  .stem-mute:hover{border-color:var(--tod-ink);}
  .stem-tile.active .stem-mute{border-color:rgba(245,240,232,0.3);color:var(--tod-bg);}
  .stem-tile.active .stem-mute.is-muted{background:rgba(245,240,232,0.15);border-color:var(--tod-bg)!important;}
  .stem-mute.is-muted{background:var(--green-faint);border-color:var(--green)!important;}
  .fx-panel{position:fixed;bottom:2rem;right:2rem;width:260px;background:var(--cream);border:1px solid var(--green-line);z-index:300;box-shadow:0 4px 24px rgba(45,90,61,0.08);opacity:0;transform:translateY(10px);pointer-events:none;transition:opacity 0.22s ease,transform 0.22s ease;}
  .fx-panel.visible{opacity:1;transform:translateY(0);pointer-events:all;}
  .fx-panel-head{display:flex;justify-content:space-between;align-items:center;padding:0.8rem 1.1rem;border-bottom:1px solid var(--green-line);}
  .fx-panel-title{font-size:0.5rem;letter-spacing:0.18em;text-transform:uppercase;opacity:0.5;display:flex;align-items:center;gap:0.45rem;}
  .fx-panel-title::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite;}
  .fx-panel-close{font-size:0.5rem;letter-spacing:0.1em;opacity:0.35;cursor:crosshair;background:none;border:none;color:var(--green);font-family:var(--mono);padding:0;}
  .fx-panel-close:hover{opacity:0.9;}
  .fx-panel-body{padding:1rem 1.1rem 1.2rem;}
  .fx-row{margin-bottom:1rem;}
  .fx-row:last-child{margin-bottom:0;}
  .fx-row-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:0.4rem;}
  .fx-row-name{font-size:0.46rem;letter-spacing:0.16em;text-transform:uppercase;opacity:0.4;}
  .fx-row-val{font-family:var(--serif);font-size:0.9rem;font-weight:700;opacity:0.85;min-width:3.5rem;text-align:right;}
  .fx-track{width:100%;height:2px;background:var(--green-line);position:relative;}
  .fx-fill{height:100%;background:var(--green);transition:width 0.1s linear;position:relative;}
  .fx-fill::after{content:'';position:absolute;right:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--cream);}
  .fx-source{font-size:0.44rem;opacity:0.28;font-style:italic;margin-top:0.3rem;}
  .fx-data-val{font-size:0.44rem;opacity:0.5;margin-top:0.15rem;letter-spacing:0.05em;}
  footer{position:relative;z-index:1;border-top:1px solid var(--green-line);padding:2rem 2.5rem;display:flex;justify-content:space-between;align-items:center;}
  footer span{font-size:0.6rem;letter-spacing:0.1em;opacity:0.3;text-transform:uppercase;}
  @media(max-width:600px){
    nav{padding:1.5rem;}.hero{padding:0 1.5rem 2.5rem;}section{padding:4rem 1.5rem;}
    .hero-meta{grid-template-columns:1fr;}footer{flex-direction:column;gap:0.5rem;align-items:flex-start;}
    .fx-panel{right:1rem;left:1rem;width:auto;}
  }
  #track-loading{position:fixed;inset:0;background:var(--tod-bg);z-index:9999;display:flex;align-items:center;justify-content:center;font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;opacity:0.4;transition:opacity 0.3s;}
</style>
<script>
// Apply TOD palette before first paint to prevent flash
(function(){
  const TOD_KF=[
    {h:0,bg:'#0e1420',ink:'#4a8f7a'},{h:5,bg:'#0e1420',ink:'#4a8f7a'},
    {h:7,bg:'#d4b896',ink:'#3d2010'},{h:17,bg:'#F5F0E8',ink:'#2D5A3D'},
    {h:20,bg:'#b8845a',ink:'#3d2010'},{h:24,bg:'#0e1420',ink:'#4a8f7a'},
  ];
  function hx(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
  function lp(a,b,t){const ra=hx(a),rb=hx(b);return'#'+[0,1,2].map(i=>Math.round(ra[i]+(rb[i]-ra[i])*t).toString(16).padStart(2,'0')).join('');}
  const now=new Date(),h=now.getHours()+now.getMinutes()/60;
  let lo=TOD_KF[TOD_KF.length-2],hi=TOD_KF[TOD_KF.length-1];
  for(let i=0;i<TOD_KF.length-1;i++){if(h>=TOD_KF[i].h&&h<TOD_KF[i+1].h){lo=TOD_KF[i];hi=TOD_KF[i+1];break;}}
  const t=(h-lo.h)/(hi.h-lo.h),bg=lp(lo.bg,hi.bg,t),ink=lp(lo.ink,hi.ink,t);
  const r=document.documentElement;
  r.style.setProperty('--tod-bg',bg);r.style.setProperty('--tod-ink',ink);
  r.style.setProperty('--cream',bg);r.style.setProperty('--green',ink);
  document.documentElement.style.background=bg;
})();
</script>
</head>
<body>

<div id="track-loading">· loading track ·</div>

<div class="fx-panel" id="fx-panel">
  <div class="fx-panel-head">
    <div class="fx-panel-title" id="fx-panel-title">Effects</div>
    <button class="fx-panel-close" id="fx-panel-close">close ×</button>
  </div>
  <div class="fx-panel-body" id="fx-panel-body"></div>
</div>

<svg id="data-canvas" xmlns="http://www.w3.org/2000/svg"></svg>

<nav>
  <div class="nav-icons">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/></svg>
    <svg viewBox="0 0 24 24"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>
    <svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
  </div>
  <div class="nav-title" id="nav-title">doux · live data player</div>
  <a href="https://eegee.substack.com" target="_blank" style="font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;opacity:0.5;color:var(--green);text-decoration:none;border-bottom:1px solid rgba(45,90,61,0.25);padding-bottom:1px;transition:opacity 0.2s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.5'">Read the dispatches →</a>
</nav>

<section class="hero" style="border-top:none;padding-top:0;">
  <div class="hero-name">doux</div>

      <label><span class="live-dot"></span>Now playing</label>

      <button class="master-play" id="master-play-btn">

<section id="cta" style="border-top:1px solid var(--green-line);padding:4rem 2.5rem;display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap;">
  <div style="max-width:520px;">
    <div style="font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;opacity:0.35;margin-bottom:1rem;">· early access</div>
    <div id="cta-headline" style="font-family:var(--serif);font-size:clamp(1.6rem,4vw,2.8rem);font-weight:800;line-height:1.1;letter-spacing:-0.01em;margin-bottom:1rem;">—</div>
    <p id="cta-body" style="font-size:0.75rem;line-height:1.7;opacity:0.55;max-width:380px;">—</p>
  </div>
  <a href="https://eegee.substack.com" target="_blank" style="display:inline-flex;align-items:center;gap:0.6rem;background:var(--green);color:var(--cream);padding:0.9rem 1.8rem;font-family:var(--mono);font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;text-decoration:none;cursor:crosshair;transition:opacity 0.2s;white-space:nowrap;" onmouseover="this.style.opacity='0.82'" onmouseout="this.style.opacity='1'">Join the dispatch list →</a>
</section>

<footer style="position:relative;z-index:1;border-top:1px solid var(--green-line);padding:2.5rem 2.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1.5rem;">
  <div style="display:flex;flex-direction:column;gap:0.4rem;">
    <span id="footer-track" style="font-size:0.55rem;letter-spacing:0.12em;text-transform:uppercase;opacity:0.3;">—</span>
  </div>
  <div style="display:flex;align-items:center;gap:2rem;">
    <a href="https://eegee.substack.com" target="_blank" style="font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;opacity:0.45;color:var(--green);text-decoration:none;transition:opacity 0.2s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.45'">Substack ↗</a>
    <a href="https://www.instagram.com/eliasgoodman/" target="_blank" style="font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;opacity:0.45;color:var(--green);text-decoration:none;transition:opacity 0.2s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.45'">Instagram ↗</a>
    <span id="live-readout" style="font-size:0.55rem;letter-spacing:0.08em;opacity:0.3;text-transform:uppercase;">· loading ·</span>
    <span id="btc-readout" style="font-size:0.55rem;letter-spacing:0.08em;opacity:0.3;text-transform:uppercase;">· btc connecting ·</span>
  </div>
</footer>

<script>
if (typeof Tone === 'undefined') {
  document.getElementById('player-status').textContent = '· Tone.js failed to load — check network connection ·';
}

// ── Background canvas ──────────────────────────────────────────────
let todStrokeColor = '#2D5A3D'; // set early — TOD palette updates this later
function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
const bgSvg = document.getElementById('data-canvas');
let bgLines = [], bgT = 0;
const vW = () => window.innerWidth, vH = () => window.innerHeight;
function initBgLines() {
  bgLines = [];
  [{amp:130,freq:0.0022,speed:0.16,op:0.24,sw:2.2},{amp:85,freq:0.0038,speed:0.26,op:0.20,sw:1.4},
   {amp:175,freq:0.0014,speed:0.11,op:0.15,sw:3.0},{amp:55,freq:0.0055,speed:0.33,op:0.22,sw:1.0},
   {amp:210,freq:0.0010,speed:0.07,op:0.10,sw:3.8},{amp:70,freq:0.0048,speed:0.24,op:0.18,sw:1.1},
   {amp:110,freq:0.0028,speed:0.19,op:0.14,sw:1.8},{amp:45,freq:0.0072,speed:0.38,op:0.20,sw:0.7},
   {amp:155,freq:0.0018,speed:0.14,op:0.09,sw:2.4},{amp:95,freq:0.0032,speed:0.22,op:0.13,sw:1.3},
  ].forEach((c,i) => bgLines.push({...c,phase:(i/10)*Math.PI*2,yBase:vH()*(0.06+(i/10)*0.88)}));
}
function makeSvgCurve(pts) {
  let d=`M ${pts[0][0]} ${pts[0][1]}`;
  for(let i=1;i<pts.length-1;i++){const mx=(pts[i][0]+pts[i+1][0])/2,my=(pts[i][1]+pts[i+1][1])/2;d+=` Q ${pts[i][0]} ${pts[i][1]} ${mx} ${my}`;}
  return d+` L ${pts[pts.length-1][0]} ${pts[pts.length-1][1]}`;
}
function renderBg() {
  bgSvg.setAttribute('width',vW());bgSvg.setAttribute('height',vH());bgSvg.innerHTML='';
  const ns='http://www.w3.org/2000/svg',defs=document.createElementNS(ns,'defs'),gr=document.createElementNS(ns,'radialGradient');
  gr.setAttribute('id','bgr');gr.setAttribute('cx','30%');gr.setAttribute('cy','40%');gr.setAttribute('r','65%');
  [[0,'0.07'],[1,'0']].forEach(([o,op])=>{const s=document.createElementNS(ns,'stop');s.setAttribute('offset',o);s.setAttribute('stop-color','#3D7A52');s.setAttribute('stop-opacity',op);gr.appendChild(s);});
  defs.appendChild(gr);bgSvg.appendChild(defs);
  const rect=document.createElementNS(ns,'rect');rect.setAttribute('width','100%');rect.setAttribute('height','100%');rect.setAttribute('fill','url(#bgr)');bgSvg.appendChild(rect);
  bgLines.forEach(l=>{
    const pts=[];
    for(let i=0;i<=90;i++){const x=(i/90)*vW();const y=l.yBase+Math.sin(i*l.freq*28+bgT*l.speed+l.phase)*l.amp+Math.sin(i*l.freq*11+bgT*l.speed*0.55+l.phase*1.4)*l.amp*0.38+Math.sin(i*l.freq*4+bgT*l.speed*0.18)*l.amp*0.14;pts.push([x,y]);}
    const p=document.createElementNS(ns,'path');p.setAttribute('d',makeSvgCurve(pts));p.setAttribute('fill','none');p.setAttribute('stroke',todStrokeColor||'#2D5A3D');p.setAttribute('stroke-width',l.sw);p.setAttribute('stroke-opacity',l.op);bgSvg.appendChild(p);
  });
}
function bgTick(){bgT+=0.006;renderBg();requestAnimationFrame(bgTick);}
initBgLines();bgTick();window.addEventListener('resize',initBgLines);

// ── Spectrum ───────────────────────────────────────────────────────
const specEl=document.getElementById('spectrum-canvas'),spec2d=specEl.getContext('2d');
let toneAnalyser=null,specT=0,isPlaying=false;
function resizeSpec(){specEl.width=specEl.offsetWidth*devicePixelRatio;specEl.height=specEl.offsetHeight*devicePixelRatio;}
resizeSpec();window.addEventListener('resize',resizeSpec);
function drawSpectrum(){
  specT++;requestAnimationFrame(drawSpectrum);
  const sw=specEl.width,sh=specEl.height;spec2d.clearRect(0,0,sw,sh);
  const ir=hexToRgb(todStrokeColor);
  const iStr=`${ir[0]},${ir[1]},${ir[2]}`;
  if(!toneAnalyser||!isPlaying){
    spec2d.beginPath();spec2d.moveTo(0,sh/2);
    for(let x=0;x<=sw;x+=2){spec2d.lineTo(x,sh/2+Math.sin((x/sw)*Math.PI*4+specT*0.03)*(sh*0.08)+Math.sin((x/sw)*Math.PI*7+specT*0.02)*(sh*0.04));}
    spec2d.strokeStyle=`rgba(${iStr},0.15)`;spec2d.lineWidth=1.5;spec2d.stroke();return;
  }
  const vals=toneAnalyser.getValue(),usable=Math.floor(vals.length*0.6),pts=[];
  for(let i=0;i<usable;i++)pts.push([(i/usable)*sw,sh-Math.max(0,(vals[i]+100)/100)*sh*0.9-sh*0.04]);
  spec2d.beginPath();spec2d.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length-1;i++)spec2d.quadraticCurveTo(pts[i][0],pts[i][1],(pts[i][0]+pts[i+1][0])/2,(pts[i][1]+pts[i+1][1])/2);
  spec2d.lineTo(pts[pts.length-1][0],pts[pts.length-1][1]);spec2d.lineTo(sw,sh);spec2d.lineTo(0,sh);spec2d.closePath();
  const g=spec2d.createLinearGradient(0,0,0,sh);g.addColorStop(0,`rgba(${iStr},0.3)`);g.addColorStop(1,`rgba(${iStr},0.02)`);
  spec2d.fillStyle=g;spec2d.fill();
  spec2d.beginPath();spec2d.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length-1;i++)spec2d.quadraticCurveTo(pts[i][0],pts[i][1],(pts[i][0]+pts[i+1][0])/2,(pts[i][1]+pts[i+1][1])/2);
  spec2d.strokeStyle=`rgba(${iStr},0.5)`;spec2d.lineWidth=1.5*devicePixelRatio;spec2d.stroke();
}

const BTC_DELTA_SENSITIVITY = 200, btcHistory = [];
let btcCurrentPrice = null;
function computeBtcDeltaNorm() {
  if (!btcCurrentPrice || btcHistory.length < 2) return 0.5;
  const ref = btcHistory.find(p => p.time >= Date.now() - 60000);
  if (!ref) return 0.5;
  return Math.max(0, Math.min(1, 0.5 + (btcCurrentPrice - ref.price) / (BTC_DELTA_SENSITIVITY * 2)));
}
function formatBtcDelta(d) {
  if (Math.abs(d) < 0.01) return '→ $0';
  return (d > 0 ? '↑ +' : '↓ ') + '$' + Math.round(Math.abs(d)).toLocaleString();
}
function connectCoinbase() {
  let ws;
  try { ws = new WebSocket('wss://advanced-trade-ws.coinbase.com/'); } catch(e) { setTimeout(connectCoinbase, 5000); return; }
  ws.onopen = () => { ws.send(JSON.stringify({ type:'subscribe', product_ids:['BTC-USD'], channel:'ticker' })); document.getElementById('btc-readout').textContent = '· btc live ·'; };
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.channel === 'ticker' && msg.events?.[0]?.tickers?.[0]) {
        const price = parseFloat(msg.events[0].tickers[0].price);
        if (isNaN(price)) return;
        btcCurrentPrice = price;
        btcHistory.push({ price, time: Date.now() });
        while (btcHistory.length && btcHistory[0].time < Date.now() - 90000) btcHistory.shift();
        const ref60 = btcHistory.find(p => p.time >= Date.now() - 60000);
        const delta60 = ref60 ? price - ref60.price : 0;
        liveData.market = { norm: computeBtcDeltaNorm(), display: `$${Math.round(price).toLocaleString()} ${formatBtcDelta(delta60)}`, delta: delta60, raw: price, label: 'BTC-USD' };
        document.getElementById('btc-readout').textContent = `· BTC $${Math.round(price).toLocaleString()} ${formatBtcDelta(delta60)} ·`;
      }
    } catch(err) {}
  };
  ws.onclose = () => { document.getElementById('btc-readout').textContent = '· btc reconnecting ·'; setTimeout(connectCoinbase, 3000); };
  ws.onerror = () => ws.close();
}

// normFns keyed by "stemKey.rowId" — not serializable so kept in JS
const NORM_FNS = {
  'subway.bits':     v => (8-v)/5,
  'subway.filter':   v => (v-300)/3500,
  'subway.feedback': v => (v-10)/55,
  'snow.wah':        v => Math.max(0,1-(v-80)/300),
  'snow.autoFilter': v => v/85,
  'snow.vibrato':    v => (v-2)/8,
  'snow.pump':       v => v/100,
  'temp.ping':       v => v/70,
  'temp.chorus':     v => (v-5)/75,
  'temp.reverb':     v => (v-5)/65,
  'wind.filter':     v => (v-100)/3500,
  'wind.dist':       v => v/100,
  'market.shift':    v => (parseFloat(v)+26)/52,
  'market.tremolo':  v => (v-0.5)/7.5,
  'time.hipass':     v => 1-(v-80)/2120,
  'time.bits':       v => (v-3)/5,
};

      <div class="stem-state-badge" id="badge-${s.key}">dry</div>

      <div class="stem-target">${s.target}</div>

      <button class="stem-mute" id="mute-${s.key}">mute</button>

  // Build fxPanelConfig from track.json rows + NORM_FNS
  track.stems.forEach(s => {

      rows: s.fxPanel.rows.map(r => ({ ...r, normFn: NORM_FNS[`${s.key}.${r.id}`] || (v => v) })),
    };
  });

  // Seed fxDisplay defaults
  fxDisplay = {

// ── Audio engine ───────────────────────────────────────────────────
let isReady = false, initInProgress = false;
const stemData = {};
function setStatus(msg){ document.getElementById('player-status').textContent = msg; }

async function initAudio() {
  if (initInProgress || isReady) return isReady;
  initInProgress = true;
  setStatus('· starting audio context ·');
  STEMS.forEach(k => { stemData[k] = { player:null, dryGain:null, wetGain:null, masterGain:null, fx:{}, analyser:null, active:false, muted:false }; });
  try {
    await Tone.start();
    setStatus('· loading stems ·');
    const TRACK_BPM = TRACK.bpm;
    const masterLimiter    = new Tone.Limiter(-3).toDestination();
    const masterCompressor = new Tone.Compressor({ threshold:-18, knee:8, ratio:4, attack:0.003, release:0.25 }).connect(masterLimiter);
    const masterBus = new Tone.Gain(0.72).connect(masterCompressor);
    toneAnalyser = new Tone.Analyser('fft', 2048);
    masterBus.connect(toneAnalyser);
    const revTemp = new Tone.Reverb({ decay:2.5, preDelay:0.01 });
    await revTemp.generate();

    function makeStemRouting(key, fxNodes) {
      const s = stemData[key];
      const stemCfg = TRACK.stems.find(x => x.key === key);
      s.masterGain = new Tone.Gain(1).connect(masterBus);
      s.dryGain    = new Tone.Gain(1).connect(s.masterGain);
      s.wetGain    = new Tone.Gain(0).connect(s.masterGain);
      s.player     = new Tone.Player({ url: stemCfg.file, loop:true, autostart:false });
      s.player.connect(s.dryGain);
      let node = s.player;
      fxNodes.forEach(fx => { node.connect(fx); node = fx; });
      node.connect(s.wetGain);
      s.analyser = new Tone.Analyser('fft', 512);
      s.masterGain.connect(s.analyser);
    }

    stemData.subway.fx.bits   = new Tone.BitCrusher(8);
    stemData.subway.fx.filter = new Tone.Filter({ frequency:2000, type:'lowpass' });
    stemData.subway.fx.delay  = new Tone.FeedbackDelay({ delayTime:'8n', feedback:0.2, wet:0.5 });
    makeStemRouting('subway', [stemData.subway.fx.bits, stemData.subway.fx.filter, stemData.subway.fx.delay]);

    const snowLfoFreq = (TRACK_BPM / 60) / 2;
    stemData.snow.fx.wah        = new Tone.AutoWah({ baseFrequency:100, octaves:3, sensitivity:-20, Q:2, gain:2, wet:0.8 });
    stemData.snow.fx.autoFilter = new Tone.AutoFilter({ frequency:snowLfoFreq, baseFrequency:200, octaves:3, wet:0.0 }).start();
    stemData.snow.fx.vibrato    = new Tone.Vibrato({ frequency:4, depth:0.1, wet:0.6 });
    stemData.snow.fx.pumpGain   = new Tone.Gain(1);
    stemData.snow.fx.pumpLfo    = new Tone.LFO({ type:'sawtooth', frequency:TRACK_BPM/60/2, min:0.85, max:1.0, phase:270 }).start();
    stemData.snow.fx.pumpLfo.connect(stemData.snow.fx.pumpGain.gain);
    makeStemRouting('snow', [stemData.snow.fx.wah, stemData.snow.fx.autoFilter, stemData.snow.fx.vibrato, stemData.snow.fx.pumpGain]);

    stemData.temp.fx.ping   = new Tone.PingPongDelay({ delayTime:'8n', feedback:0.1, wet:0.0 });
    stemData.temp.fx.chorus = new Tone.Chorus({ frequency:2, delayTime:2.5, depth:0.15, wet:0.3 }).start();
    stemData.temp.fx.reverb = revTemp;
    makeStemRouting('temp', [stemData.temp.fx.ping, stemData.temp.fx.chorus, stemData.temp.fx.reverb]);

    stemData.wind.fx.filter = new Tone.Filter({ frequency:800, type:'lowpass' });
    stemData.wind.fx.dist   = new Tone.Distortion({ distortion:0.0, wet:0.0 });
    makeStemRouting('wind', [stemData.wind.fx.filter, stemData.wind.fx.dist]);

    stemData.market.fx.freqShift = new Tone.FrequencyShifter(0);
    stemData.market.fx.tremolo   = new Tone.Tremolo({ frequency:1, depth:0.1, wet:0.5 }).start();
    makeStemRouting('market', [stemData.market.fx.freqShift, stemData.market.fx.tremolo]);

    stemData.time.fx.hipass = new Tone.Filter({ frequency:1200, type:'highpass' });
    stemData.time.fx.bits   = new Tone.BitCrusher(8);
    makeStemRouting('time', [stemData.time.fx.hipass, stemData.time.fx.bits]);

    setStatus('· buffering audio ·');
    STEMS.forEach(k => {
      const p = stemData[k].player; if (!p) return;
      p.buffer.onload  = () => console.log(`✓ ${k}`);
      p.buffer.onerror = (e) => console.error(`✗ ${k}`, e);
    });
    await Promise.race([Tone.loaded(), new Promise((_,rej) => setTimeout(()=>rej(new Error('load timeout')), 20000))]);
    isReady = true; initInProgress = false;
    setStatus('· ready · press play ·');
    return true;
  } catch(err) {
    console.error('Audio init failed:', err);
    setStatus('· error: ' + err.message + ' ·');
    initInProgress = false;
    return false;
  }
}

function startAll() {

// ── Modulation loop ────────────────────────────────────────────────
function runModulation() {
  if (!isReady || !TRACK) return;
  const now = Tone.now();

  if (stemData.subway?.active) {
    const v = liveData.subway.norm, bits = Math.round(8 - v*5);
    stemData.subway.fx.bits.bits = bits;
    stemData.subway.fx.filter.frequency.setTargetAtTime(300+v*3500, now, 0.15);
    stemData.subway.fx.delay.feedback.setTargetAtTime(0.1+v*0.55, now, 0.15);
    fxDisplay.subway = { bits, filter: Math.round(300+v*3500), feedback: Math.round((0.1+v*0.55)*100) };
  }
  if (stemData.snow?.active) {
    const v = liveData.snow.norm;
    stemData.snow.fx.wah.baseFrequency = 80+(1-v)*300;
    stemData.snow.fx.wah.sensitivity   = -30+v*20;
    stemData.snow.fx.wah.wet.setTargetAtTime(0.3+v*0.7, now, 0.2);
    stemData.snow.fx.autoFilter.baseFrequency = 200+v*1800;
    stemData.snow.fx.autoFilter.wet.setTargetAtTime(v*0.85, now, 0.25);
    stemData.snow.fx.vibrato.depth.setTargetAtTime(0.05+v*0.4, now, 0.25);
    stemData.snow.fx.vibrato.frequency.setTargetAtTime(2+v*8, now, 0.25);
    stemData.snow.fx.pumpLfo.min = v;
    fxDisplay.snow = { wah: Math.round(80+(1-v)*300), autoFilter: Math.round(v*85), vibrato: +(2+v*8).toFixed(1), pump: Math.round((1-v)*100) };
  }
  if (stemData.temp?.active) {
    const v = liveData.temp.norm;
    stemData.temp.fx.ping.feedback.setTargetAtTime(0.05+v*0.55, now, 0.3);
    stemData.temp.fx.ping.wet.setTargetAtTime(v*0.7, now, 0.3);
    stemData.temp.fx.chorus.depth = 0.05+v*0.75;
    stemData.temp.fx.chorus.wet.setTargetAtTime(0.1+v*0.6, now, 0.3);
    stemData.temp.fx.reverb.wet.rampTo(0.05+v*0.65, 0.5);
    fxDisplay.temp = { ping: Math.round(v*70), chorus: Math.round((0.05+v*0.75)*100), reverb: Math.round((0.05+v*0.65)*100) };
  }
  if (stemData.wind?.active) {
    const v = liveData.wind.norm;
    stemData.wind.fx.filter.frequency.setTargetAtTime(100+v*3500, now, 0.2);
    stemData.wind.fx.dist.distortion = v*0.85;
    stemData.wind.fx.dist.wet.setTargetAtTime(v*0.9, now, 0.2);
    fxDisplay.wind = { filter: Math.round(100+v*3500), dist: Math.round(v*100) };
  }
  if (stemData.market?.active) {
    const v = liveData.market.norm, shiftHz = (v-0.5)*52, mag = Math.abs(v-0.5)*2;
    stemData.market.fx.freqShift.frequency.setTargetAtTime(shiftHz, now, 0.5);
    stemData.market.fx.tremolo.frequency.setTargetAtTime(0.5+mag*7.5, now, 0.3);
    stemData.market.fx.tremolo.depth.setTargetAtTime(0.05+mag*0.75, now, 0.3);
    fxDisplay.market = { shift: shiftHz.toFixed(1), tremolo: +(0.5+mag*7.5).toFixed(1) };
  }
  if (stemData.time?.active) {
    const v = liveData.time.norm, hpFreq = 80+(1-v)*2120;
    stemData.time.fx.hipass.frequency.setTargetAtTime(hpFreq, now, 1.0);
    stemData.time.fx.bits.bits = Math.round(3+v*5);
    fxDisplay.time = { hipass: Math.round(hpFreq), bits: Math.round(3+v*5) };
  }
  refreshFxPanel();
}
setInterval(runModulation, 100);

// ── Per-stem canvas waveforms ──────────────────────────────────────
const stemCanvases = {};
function initStemCanvases() {
  STEMS.forEach((k, ki) => {
    const el = document.getElementById('canvas-'+k); if (!el) return;
    el.width  = (el.offsetWidth  || 160) * devicePixelRatio;
    el.height = (el.offsetHeight || 26)  * devicePixelRatio;
    stemCanvases[k] = { el, ctx: el.getContext('2d'), ki };
  });
}
window.addEventListener('resize', () => {
  STEMS.forEach(k => { const sc = stemCanvases[k]; if (!sc) return; sc.el.width = sc.el.offsetWidth*devicePixelRatio; sc.el.height = sc.el.offsetHeight*devicePixelRatio; });
});
let stemCanvasT = 0;
function drawStemCanvases() {
  stemCanvasT++;requestAnimationFrame(drawStemCanvases);
  STEMS.forEach(k => {
    const sc = stemCanvases[k]; if (!sc) return;
    const { el, ctx, ki } = sc, w = el.width, h = el.height;
    ctx.clearRect(0,0,w,h);
    const isActive = stemData[k]?.active;
    // active state always uses bg color (inverted); inactive uses ink color
    const inkR = hexToRgb(todStrokeColor), bgR = hexToRgb(getComputedStyle(document.documentElement).getPropertyValue('--tod-bg').trim()||'#F5F0E8');
    const lineColor = isActive ? `rgba(${bgR[0]},${bgR[1]},${bgR[2]},0.85)` : `rgba(${inkR[0]},${inkR[1]},${inkR[2]},0.35)`;
    const fillColor = isActive ? `rgba(${bgR[0]},${bgR[1]},${bgR[2]},0.12)` : `rgba(${inkR[0]},${inkR[1]},${inkR[2]},0.06)`;
    const analyser  = stemData[k]?.analyser;
    if (!analyser || !isPlaying) {
      ctx.beginPath();ctx.moveTo(0,h/2);
      for (let x=0;x<=w;x+=2){const y=h/2+Math.sin((x/w)*Math.PI*3+stemCanvasT*0.018+ki*0.8)*(h*0.22)+Math.sin((x/w)*Math.PI*6+stemCanvasT*0.011+ki*1.2)*(h*0.08);ctx.lineTo(x,y);}
      ctx.strokeStyle=lineColor;ctx.lineWidth=1*devicePixelRatio;ctx.stroke();return;
    }
    const vals = analyser.getValue(), usable = Math.floor(vals.length*0.65); if (usable < 2) return;
    const pts = [];
    for (let i=0;i<usable;i++)pts.push([(i/usable)*w,h-Math.max(0,(vals[i]+100)/100)*h*0.9-h*0.02]);
    ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
    for (let i=1;i<pts.length-1;i++)ctx.quadraticCurveTo(pts[i][0],pts[i][1],(pts[i][0]+pts[i+1][0])/2,(pts[i][1]+pts[i+1][1])/2);
    ctx.lineTo(pts[pts.length-1][0],pts[pts.length-1][1]);ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();
    ctx.fillStyle=fillColor;ctx.fill();
    ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
    for (let i=1;i<pts.length-1;i++)ctx.quadraticCurveTo(pts[i][0],pts[i][1],(pts[i][0]+pts[i+1][0])/2,(pts[i][1]+pts[i+1][1])/2);
    ctx.strokeStyle=lineColor;ctx.lineWidth=1.2*devicePixelRatio;ctx.stroke();
  });
}

      <div class="fx-track"><div class="fx-fill" id="fxb-${key}-${r.id}" style="width:2%"></div></div>
      <div class="fx-source">← ${r.src}</div>
      <div class="fx-data-val" id="fxd-${key}">Live: ${liveData[key].display}</div>
    </div>
  `).join('');
  fxPanel.classList.add('visible');
  refreshFxPanel();
}
function closeFxPanel() { fxPanel.classList.remove('visible'); fxPanelKey = null; }
document.getElementById('fx-panel-close').addEventListener('click', closeFxPanel);

function refreshFxPanel() {
  if (!fxPanelKey) return;
  const cfg = fxPanelConfig[fxPanelKey]; if (!cfg) return;
  const vals = fxDisplay[fxPanelKey];
  cfg.rows.forEach(r => {
    const vEl = document.getElementById(`fxv-${fxPanelKey}-${r.id}`);
    const bEl = document.getElementById(`fxb-${fxPanelKey}-${r.id}`);
    const dEl = document.getElementById(`fxd-${fxPanelKey}`);
    if (!vEl || !bEl) return;
    const raw = vals[r.id];
    vEl.textContent = raw + ' ' + r.unit;
    bEl.style.width = Math.max(2, Math.min(98, r.normFn(raw)*100)) + '%';
    if (dEl) dEl.textContent = 'Live: ' + liveData[fxPanelKey].display;
  });
}

// ── Play button ────────────────────────────────────────────────────
document.getElementById('master-play-btn').addEventListener('click', async () => {
  if (typeof Tone === 'undefined') { setStatus('· Tone.js not loaded ·'); return; }
  const icon = document.getElementById('play-icon'), label = document.getElementById('play-label');
  if (!isReady) { const ok = await initAudio(); if (!ok) return; }
  if (isPlaying) {
    stopAll(); icon.innerHTML='<polygon points="0,0 10,6 0,12"/>'; label.textContent='Play track'; setStatus('· paused ·'); isPlaying=false;
  } else {
    startAll(); icon.innerHTML='<rect x="0" y="0" width="3" height="12"/><rect x="6" y="0" width="3" height="12"/>'; label.textContent='Pause';
    setStatus(TRACK?.meta.statusPlaying || '· playing ·'); isPlaying=true;
  }
});

// ── Tile + mute interactions ───────────────────────────────────────
function attachTileInteractions() {
  STEMS.forEach(key => {
    const tile = document.getElementById('tile-'+key), badge = document.getElementById('badge-'+key);
    if (!tile) return;
    tile.addEventListener('click', e => {
      if (e.target.classList.contains('stem-mute')) return;
      if (!isReady) { setStatus('· press play first ·'); return; }
      const s = stemData[key];
      if (s.active) {
        s.active=false; s.dryGain.gain.rampTo(1,0.35); s.wetGain.gain.rampTo(0,0.35);
        tile.classList.remove('active'); badge.textContent='dry';
        const n = STEMS.filter(k=>stemData[k]?.active).length;
        setStatus(n ? `· ${n} stem${n>1?'s':''} data-active ·` : (TRACK?.meta.statusPlaying||'· playing ·'));
        if (fxPanelKey===key) closeFxPanel();
      } else {
        s.active=true; s.dryGain.gain.rampTo(0,0.35); s.wetGain.gain.rampTo(1,0.35);
        tile.classList.add('active'); badge.textContent='data active';
        const n = STEMS.filter(k=>stemData[k]?.active).length;
        setStatus(`· ${n} stem${n>1?'s':''} data-active ·`);
        openFxPanel(key);
      }
    });
  });
}
function attachMuteInteractions() {
  STEMS.forEach(key => {
    const btn = document.getElementById('mute-'+key); if (!btn) return;
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const s = stemData[key]; if (!s) return;
      s.muted=!s.muted; btn.textContent=s.muted?'unmute':'mute'; btn.classList.toggle('is-muted',s.muted);
      if (s.masterGain) s.masterGain.gain.rampTo(s.muted?0:1,0.12);
    });
  });
}
document.addEventListener('click', e => {
  if (fxPanel.classList.contains('visible') && !fxPanel.contains(e.target) && !e.target.closest('.stem-tile')) closeFxPanel();
});

// ── Time-of-day palette ────────────────────────────────────────────
const TOD_KEYFRAMES = [
  { h:  0, bg:'#0e1420', ink:'#4a8f7a', stroke:'#4a8f7a' },
  { h:  5, bg:'#0e1420', ink:'#4a8f7a', stroke:'#4a8f7a' },
  { h:  7, bg:'#d4b896', ink:'#3d2010', stroke:'#3d2010' },
  { h: 17, bg:'#F5F0E8', ink:'#2D5A3D', stroke:'#2D5A3D' },
  { h: 20, bg:'#b8845a', ink:'#3d2010', stroke:'#3d2010' },
  { h: 24, bg:'#0e1420', ink:'#4a8f7a', stroke:'#4a8f7a' },
];
function lerpColor(a, b, t) {
  const ra=hexToRgb(a), rb=hexToRgb(b);
  return '#'+[0,1,2].map(i=>Math.round(ra[i]+(rb[i]-ra[i])*t).toString(16).padStart(2,'0')).join('');
}
function rgbToRgba(hex, alpha) {
  const [r,g,b]=hexToRgb(hex); return `rgba(${r},${g},${b},${alpha})`;
}
function getTodPalette() {
  const now=new Date(), h=now.getHours()+now.getMinutes()/60+now.getSeconds()/3600;
  const kf=TOD_KEYFRAMES;
  let lo=kf[kf.length-2], hi=kf[kf.length-1];
  for (let i=0;i<kf.length-1;i++) { if (h>=kf[i].h && h<kf[i+1].h) { lo=kf[i]; hi=kf[i+1]; break; } }
  const t=(h-lo.h)/(hi.h-lo.h);
  return { bg:lerpColor(lo.bg,hi.bg,t), ink:lerpColor(lo.ink,hi.ink,t), stroke:lerpColor(lo.stroke,hi.stroke,t) };
}
let _todFirstApply = true;
function applyTodPalette() {
  const p=getTodPalette();
  todStrokeColor=p.stroke;
  const root=document.documentElement;
  if (_todFirstApply) {
    // disable transition for instant snap on load
    document.body.style.transition = 'none';
  }
  root.style.setProperty('--tod-bg',    p.bg);
  root.style.setProperty('--tod-ink',   p.ink);
  root.style.setProperty('--cream',     p.bg);
  root.style.setProperty('--green',     p.ink);
  root.style.setProperty('--green-line',rgbToRgba(p.ink,0.18));
  root.style.setProperty('--green-faint',rgbToRgba(p.ink,0.07));
  if (_todFirstApply) {
    // re-enable transition after a frame so subsequent changes fade slowly
    requestAnimationFrame(() => { document.body.style.transition = 'background 120s linear, color 120s linear'; });
    _todFirstApply = false;
  }
}
applyTodPalette();
setInterval(applyTodPalette, 30000);

// ── Boot ───────────────────────────────────────────────────────────
loadTrack();
</script>
